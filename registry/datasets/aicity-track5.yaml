    no redistribution). Exact terms not individually verified; recorded as
    unclear and not assumed permissive.

task_fit:
  trafficpulse_capabilities: [helmet_classification, rider_count]
  ontology_references:
    helmet_states: [helmet, no_helmet]
    violation_types: [no_helmet, triple_riding]
    observation_types: [helmet_state, rider_count]
  annotation_types: [bounding_boxes, helmet_rider_labels]
  strengths: Directly relevant CCTV-viewpoint helmet + rider-count labels if granted.
  domain_gaps: >
    Access gated and unconfirmed; not Indian-context; turban labelling absent.
    Load-bearing only if granted — the annotation budget must assume it may not be.
  suitability: partially_suitable
  custom_data_still_required: required

split_leakage:
