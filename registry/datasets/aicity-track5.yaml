  status: application_required
  procedure: >
    Request access via the AI City Challenge dataset-access process (data-access
    agreement; contact aicitychallenges@gmail.com). Challenge track numbering is
    year-specific: the helmet task was 2023 Track 5, which differs from later years.
  registration_required: required
  application_required: required
  access_confirmed_by_project: false
  notes: >
    Verified 2026-07-07 that AI City data is obtained through a data-access
    agreement via the official site. The project has NOT applied for or been
    granted access; access is UNCONFIRMED and the project must not assume it.

licensing:
