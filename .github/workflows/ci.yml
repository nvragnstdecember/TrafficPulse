name: CI

# Single-environment Linux quality gate for the Phase 0-F repository baseline.
# Deliberately minimal: one OS, one Python version, three checks
# (ruff, mypy, pytest). No matrix, GPU, Docker, dataset, model-download,
# or deployment jobs (see docs/phase-0-plan.md, U1).

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install project and development tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Ruff (lint)
        run: ruff check .

      - name: mypy (static type check)
        run: mypy src

      - name: pytest (tests)
        run: pytest -q
