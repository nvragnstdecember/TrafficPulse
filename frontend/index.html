<!doctype html>
<html lang="en" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <meta
      name="description"
      content="TrafficPulse — evidence-first traffic-violation detection console."
    />
    <title>TrafficPulse</title>
    <!--
      No-FOUC theme bootstrap: resolve and apply the persisted theme BEFORE the
      first paint, so the app never flashes the wrong theme on load. Kept in sync
      with the storage key + logic in src/providers/theme-provider.tsx.
    -->
    <script>
      (function () {
        try {
          var key = 'trafficpulse-theme';
          var stored = localStorage.getItem(key);
          var theme =
            stored === 'light' || stored === 'dark' || stored === 'system' ? stored : 'system';
          var systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          var isDark = theme === 'dark' || (theme === 'system' && systemDark);
          var root = document.documentElement;
          root.classList.toggle('dark', isDark);
          root.style.colorScheme = isDark ? 'dark' : 'light';
        } catch (e) {
          /* ignore: fall back to CSS defaults */
        }
      })();
    </script>
  </head>
  <body class="h-full">
    <div id="root" class="h-full"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
